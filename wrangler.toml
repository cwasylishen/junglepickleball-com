name = "junglepickleball-com"
compatibility_date = "2026-01-01"

# Static-assets Worker deploy, matching the other wizardweb sites (`wrangler deploy`).
[assets]
directory = "./"
not_found_handling = "404-page"

# The events admin (functions/) is dormant in static-only mode. To turn it on later,
# add a `main` Worker entry that routes /api/* and serves assets, then uncomment this
# KV binding (namespace "junglepickleball-events" in the wizardweb account):
# [[kv_namespaces]]
# binding = "EVENTS"
# id = "0c6dbe2eca394cc8a4ddf98147dc0332"
